name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 20

      - run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Lint markdown
        run: yarn lint:md

      - name: Build docusaurus static files
        run: yarn build
